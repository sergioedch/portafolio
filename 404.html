<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Sergio Eduardo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Tipografía limpia que hace match con tu portafolio */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Estilos específicos que Bootstrap no cubre por defecto */
        .cat-img {
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            object-fit: cover;
        }

        .code-404 {
            /* Usamos clamp para que el texto se achique solo en celulares */
            font-size: clamp(90px, 10vw, 140px);
            font-weight: 800;
            color: #111827;
            line-height: 1;
            letter-spacing: -4px;
        }

        .btn-home {
            background-color: #374151;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: #1f2937 !important;
            color: #ffffff !important;
            border-color: #1f2937 !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(31, 41, 55, 0.25);
        }

    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100 bg-light">

    <div class="container">
        <div class="row align-items-center text-center text-md-start">

            <div class="col-12 col-md-6 d-flex justify-content-center justify-content-md-end pe-md-5 mb-5 mb-md-0">
                <img src="https://sergioedch.github.io/portafolio/src/images/0938abcdeb5273e2e63072f570c0fbfb.jpg"
                    alt="Gato escondido" class="cat-img img-fluid">
            </div>

            <div class="col-12 col-md-6 ps-md-4">
                <h1 class="code-404 mb-2">404</h1>
                <h2 class="fw-bold mb-3" style="color: #374151;">Página no encontrada</h2>
                <p class="fs-5 text-secondary mb-4 mx-auto mx-md-0" style="max-width: 500px; line-height: 1.7;">
                    Parece que exploraste demasiado lejos. La ruta que buscas no existe o fue movida de mi portafolio.
                </p>
                <a href="/"
                    class="btn btn-home rounded-pill px-4 py-2 fw-semibold d-inline-flex align-items-center gap-2">

                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

                        <path
                            d="M9 17.25C8.58579 17.25 8.25 17.5858 8.25 18C8.25 18.4142 8.58579 18.75 9 18.75H15C15.4142 18.75 15.75 18.4142 15.75 18C15.75 17.5858 15.4142 17.25 15 17.25H9Z"
                            fill="white" />

                        <path
                            d="M12 2.75L4 8.5V20C4 20.5523 4.44772 21 5 21H19C19.5523 21 20 20.5523 20 20V8.5L12 2.75Z"
                            stroke="white" stroke-width="1.5" fill="none" />

                    </svg>

                    Volver al Inicio
                </a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
