<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Sergio Eduardo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Tipografía limpia que hace match con tu portafolio */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Estilos específicos que Bootstrap no cubre por defecto */
        .cat-img {
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            object-fit: cover;
        }

        .code-404 {
            /* Usamos clamp para que el texto se achique solo en celulares */
            font-size: clamp(90px, 10vw, 140px); 
            font-weight: 800;
            color: #111827;
            line-height: 1;
            letter-spacing: -4px;
        }

        .btn-home {
            background-color: #374151;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: #1f2937;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(31, 41, 55, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">

    <div class="container">
        <div class="row align-items-center text-center text-md-start">
            
            <div class="col-12 col-md-6 d-flex justify-content-center justify-content-md-end pe-md-5 mb-5 mb-md-0">
                <img src="https://sergio-eduardo500.github.io/portafolio/src/images/0938abcdeb5273e2e63072f570c0fbfb.jpg" alt="Gato escondido" class="cat-img img-fluid">
            </div>

            <div class="col-12 col-md-6 ps-md-4">
                <h1 class="code-404 mb-2">404</h1>
                <h2 class="fw-bold mb-3" style="color: #374151;">Página no encontrada</h2>
                <p class="fs-5 text-secondary mb-4 mx-auto mx-md-0" style="max-width: 500px; line-height: 1.7;">
                    Parece que exploraste demasiado lejos. La ruta que buscas no existe o fue movida de mi portafolio.
                </p>
                <a href="/portafolio/" class="btn btn-home rounded-pill px-5 py-3 fw-semibold fs-5">Volver al Inicio</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
